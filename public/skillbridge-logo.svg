<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" fill="#1e3a8a" rx="20"/>
  
  <!-- Central circle (hub) -->
  <circle cx="100" cy="100" r="18" fill="#ffffff"/>
  
  <!-- Outer nodes -->
  <circle cx="100" cy="50" r="14" fill="#ffffff"/>
  <circle cx="142" cy="75" r="14" fill="#ffffff"/>
  <circle cx="142" cy="125" r="14" fill="#ffffff"/>
  <circle cx="100" cy="150" r="14" fill="#ffffff"/>
  <circle cx="58" cy="125" r="14" fill="#ffffff"/>
  <circle cx="58" cy="75" r="14" fill="#ffffff"/>
  
  <!-- Connection lines -->
  <line x1="100" y1="100" x2="100" y2="50" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="142" y2="75" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="142" y2="125" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="100" y2="150" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="58" y2="125" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="58" y2="75" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Decorative accent (exchange arrows) -->
  <path d="M 75 85 L 85 95 L 75 90" fill="none" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 125 115 L 115 105 L 125 110" fill="none" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>