spring.application.name=skillbridge-backend
spring.config.import=optional:classpath:application-local.properties
server.port=8080
server.servlet.context-path=/api

# MySQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
# Set password in application-local.properties (not committed) or MYSQL_PASSWORD env var
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
skillbridge.jwt.secret=${JWT_SECRET}
skillbridge.jwt.expiration-ms=86400000

# CORS
skillbridge.cors.allowed-origins=http://localhost:4200,http://localhost:4300

# Email (configure for production)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
skillbridge.mail.enabled=false
skillbridge.mail.from=noreply@skillbridge.com

# File upload
spring.servlet.multipart.max-file-size=5MB
skillbridge.upload.dir=uploads
