<mat-sidenav-container class="layout-container">
  <mat-sidenav #sidenav mode="side" opened class="sidebar" [class.dark]="theme.isDarkMode()">
    <div class="brand">
  <div class="brand-logo">SB</div>

  <div class="brand-info">
    <span class="brand-title">SkillBridge</span>
    <small>Learn • Teach • Connect</small>
  </div>
</div>
    <mat-nav-list>
      @for (item of navItems; track item.path) {
        <a mat-list-item [routerLink]="item.path" routerLinkActive="active">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
    <div class="sidebar-footer">
      <button mat-button (click)="theme.toggle()">
        <mat-icon>{{ theme.isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
        {{ theme.isDarkMode() ? 'Light' : 'Dark' }} Mode
      </button>
      <button mat-button routerLink="/profile">
        <mat-icon>person</mat-icon>
        Profile
      </button>
      <button mat-button color="warn" (click)="logout()">
        <mat-icon>logout</mat-icon> Logout
      </button>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="topbar">
      <button mat-icon-button (click)="sidenav.toggle()" class="menu-btn">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="toolbar-title">SkillBridge</span>
      <span class="spacer"></span>
      <button mat-icon-button matTooltip="Notifications">
  <mat-icon>notifications</mat-icon>
</button>

<div
  class="profile-menu"
  [matMenuTriggerFor]="profileMenu">

  <div class="avatar-letter">
    {{ auth.currentUser()?.firstName?.charAt(0) }}
  </div>

  <span>{{ auth.currentUser()?.firstName }}</span>

  <mat-icon>keyboard_arrow_down</mat-icon>

</div>

<mat-menu #profileMenu="matMenu">

  <button mat-menu-item routerLink="/profile">
    <mat-icon>person</mat-icon>
    <span>My Profile</span>
  </button>

  <button mat-menu-item>
    <mat-icon>settings</mat-icon>
    <span>Settings</span>
  </button>

  <button mat-menu-item (click)="logout()">
    <mat-icon>logout</mat-icon>
    <span>Logout</span>
  </button>

</mat-menu>

    </mat-toolbar>
    <main class="page-content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
