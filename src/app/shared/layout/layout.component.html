<mat-sidenav-container class="layout-container">
  <mat-sidenav #sidenav mode="side" opened class="sidebar" [class.dark]="theme.isDarkMode()">
    <div class="brand">
      <mat-icon>hub</mat-icon>
      <span>SkillBridge</span>
    </div>
    <mat-nav-list>
      @for (item of navItems; track item.path) {
        <a mat-list-item [routerLink]="item.path" routerLinkActive="active">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
    <div class="sidebar-footer">
      <button mat-button (click)="theme.toggle()">
        <mat-icon>{{ theme.isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
        {{ theme.isDarkMode() ? 'Light' : 'Dark' }} Mode
      </button>
      <button mat-button routerLink="/profile">
        <mat-icon>person</mat-icon>
        Profile
      </button>
      <button mat-button color="warn" (click)="logout()">
        <mat-icon>logout</mat-icon> Logout
      </button>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="topbar">
      <button mat-icon-button (click)="sidenav.toggle()" class="menu-btn">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="toolbar-title">SkillBridge</span>
      <span class="spacer"></span>
      <span class="user-greeting">Hi, {{ auth.currentUser()?.firstName }}!</span>
      <button mat-icon-button routerLink="/dashboard" matTooltip="Notifications">
        <mat-icon matBadge="!" matBadgeColor="warn" matBadgeSize="small" [matBadgeHidden]="true">notifications</mat-icon>
      </button>
    </mat-toolbar>
    <main class="page-content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
