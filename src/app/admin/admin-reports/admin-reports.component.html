<div class="toolbar">
  <mat-form-field appearance="outline"><mat-label>Search reports</mat-label><input matInput [(ngModel)]="search" (ngModelChange)="applyFilters()" placeholder="Reporter, reported, reason" /></mat-form-field>
  <mat-form-field appearance="outline"><mat-label>Status</mat-label><mat-select [(ngModel)]="statusFilter" (selectionChange)="applyFilters()"><mat-option value="ALL">All</mat-option><mat-option value="OPEN">Open</mat-option><mat-option value="RESOLVED">Resolved</mat-option><mat-option value="DISMISSED">Dismissed</mat-option></mat-select></mat-form-field>
  <div class="spacer"></div>
  <button mat-stroked-button (click)="loadReports()">Refresh</button>
</div>

@if (loading) {
  <div class="loading"><mat-spinner></mat-spinner></div>
}
@if (!loading) {
  <div class="reports-grid">
    @for (r of paginated; track r.id) {
      <mat-card class="report-card">
        <div class="top">
          <div>
            <h4>{{ r.reporterName }} reported {{ r.reportedUserName }}</h4>
            <small>{{ r.createdAt | date:'short' }}</small>
          </div>
          <mat-chip color="warn">{{ r.status }}</mat-chip>
        </div>
        <p>{{ r.reason }}</p>
        <div class="actions">
          <button mat-stroked-button color="primary" (click)="resolve(r)">Resolve</button>
          <button mat-button (click)="dismiss(r)">Dismiss</button>
          <button mat-button color="warn" (click)="suspendReportedUser(r)">Suspend User</button>
          <button mat-button (click)="viewUser(r.reportedUserId)">View User</button>
        </div>
      </mat-card>
    }
  </div>

  <mat-paginator [length]="filtered.length" [pageSize]="pageSize" [pageSizeOptions]="[5,10,25]" (page)="onPageChange($event)"></mat-paginator>
}
